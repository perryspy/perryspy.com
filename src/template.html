<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{META_TITLE}}</title>
<meta name="description" content="{{META_DESC}}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    {{CSS_VARS}}
    --serif:'DM Serif Display',Georgia,serif;
    --sans:'Instrument Sans',system-ui,sans-serif;
    --mono:'DM Mono',monospace;
  }
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.6;min-height:100vh}
  a{color:inherit;text-decoration:none}
  .shell{display:grid;grid-template-columns:300px 1fr;min-height:100vh}

  /* ── Sidebar ── */
  .sidebar{position:sticky;top:0;height:100vh;background:var(--bg2);border-right:1px solid var(--border);padding:2.5rem 2rem;display:flex;flex-direction:column;overflow-y:auto}
  .status-dot{display:inline-flex;align-items:center;gap:7px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--green-bright);font-family:var(--mono);margin-bottom:2rem}
  .status-dot::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--green-bright);box-shadow:0 0 0 3px rgba(106,181,112,.15);animation:pulse 2.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .name{font-family:var(--serif);font-size:3rem;line-height:1.05;letter-spacing:-.01em;margin-bottom:.35rem;color:#f0ede4}
  .name em{font-style:italic;color:var(--amber)}
  .title-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-family:var(--mono);margin-bottom:1.75rem}
  .divider{height:1px;background:var(--border);margin:1.5rem 0}
  .bio{font-size:13.5px;color:var(--muted);line-height:1.7;margin-bottom:1.5rem}
  .bio strong{color:var(--text);font-weight:500}
  .section-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-family:var(--mono);margin-bottom:.75rem}
  .stack-grid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:1.5rem}
  .tag{font-size:11px;font-family:var(--mono);padding:3px 8px;border-radius:3px;border:1px solid var(--border);color:var(--muted);background:var(--bg3);cursor:default}
  .tag:hover,.tag.hi{border-color:var(--amber-dim);color:var(--amber)}
  .tag.hi{background:var(--amber-bg)}
  .nav-links{display:flex;flex-direction:column;gap:2px;margin-top:auto;padding-top:1.5rem}
  .nav-link{font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-family:var(--mono);padding:5px 0 5px 10px;border-left:2px solid transparent}
  .nav-link:hover{color:var(--amber);border-left-color:var(--amber)}
  .contacts{margin-top:1.5rem;display:flex;flex-direction:column;gap:6px}
  .contact-item{font-size:12px;color:var(--muted);font-family:var(--mono);display:flex;align-items:center;gap:7px}
  .contact-item:hover{color:var(--amber)}
  .contact-item svg{opacity:.5;flex-shrink:0}

  /* ── Main ── */
  .main{padding:0 3.5rem 4rem;max-width:780px}
  .section{padding:3.5rem 0 0}
  .section-head{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--faint);font-family:var(--mono);padding-bottom:1.25rem;border-bottom:1px solid var(--border);margin-bottom:2rem}
  .job{margin-bottom:2.75rem;padding-bottom:2.75rem;border-bottom:1px solid var(--border)}
  .job:last-child{border-bottom:none;margin-bottom:0}
  .job-meta{display:grid;grid-template-columns:130px 1fr;gap:1rem;align-items:start;margin-bottom:1rem}
  .job-date{font-size:11px;color:var(--faint);font-family:var(--mono);padding-top:.25rem;line-height:1.5}
  .job-title{font-family:var(--serif);font-size:1.25rem;color:#f0ede4;line-height:1.2;margin-bottom:.2rem}
  .job-company{font-size:12px;font-family:var(--mono);color:var(--amber);letter-spacing:.04em}
  .job-body{padding-left:146px}
  .job-subtitle{font-size:10px;font-family:var(--mono);color:var(--muted);margin:.75rem 0 .6rem;letter-spacing:.07em;text-transform:uppercase;border-left:2px solid var(--amber-dim);padding-left:.6rem}
  .job-bullets{list-style:none;padding:0;margin-bottom:1rem}
  .job-bullets li{font-size:13.5px;color:var(--muted);line-height:1.7;padding-left:1.1rem;position:relative;margin-bottom:.35rem}
  .job-bullets li::before{content:'—';position:absolute;left:0;color:var(--faint);font-size:12px}
  .job-stack{display:flex;flex-wrap:wrap;gap:4px;margin-top:.75rem}
  .edu{display:grid;grid-template-columns:130px 1fr;gap:1rem;margin-bottom:1.5rem;align-items:start}
  .edu-year{font-size:11px;color:var(--faint);font-family:var(--mono);padding-top:.2rem;line-height:1.5}
  .edu-degree{font-family:var(--serif);font-size:1.15rem;color:#f0ede4;line-height:1.2;margin-bottom:.2rem}
  .edu-school{font-size:12px;font-family:var(--mono);color:var(--muted)}
  .edu-honors{display:inline-block;margin-top:.4rem;font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;color:var(--amber);border:1px solid var(--amber-dim);padding:2px 7px;border-radius:2px;background:var(--amber-bg)}
  .cert{font-size:12px;color:var(--muted);font-family:var(--mono);margin-top:.3rem}
  .skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
  .skill-group-name{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;color:var(--faint);margin-bottom:.6rem}
  .skill-list{display:flex;flex-wrap:wrap;gap:4px}
  .clearance-badge{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-family:var(--mono);background:var(--amber-bg);border:1px solid var(--amber-dim);color:var(--amber);padding:8px 14px;border-radius:3px;letter-spacing:.05em}
  .clearance-badge::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--amber);box-shadow:0 0 0 3px rgba(212,148,58,.15);animation:pulse 2.5s ease-in-out infinite}
  .dl-btn{display:inline-flex;align-items:center;gap:8px;margin-top:1.5rem;font-size:12px;font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;color:var(--bg);background:var(--amber);padding:10px 20px;border-radius:3px;border:none;text-decoration:none}
  .dl-btn:hover{opacity:.85}
  .footer{margin-top:3rem;padding-top:2rem;border-top:1px solid var(--border);font-size:11px;color:var(--faint);font-family:var(--mono);letter-spacing:.05em}

  @media(max-width:860px){
    .shell{display:block}
    .sidebar{position:relative;height:auto;border-right:none;border-bottom:1px solid var(--border)}
    .main{padding:2rem 1.5rem 3rem;max-width:100%}
    .job-body{padding-left:0}
    .job-meta,.edu{grid-template-columns:1fr;gap:.25rem}
    .skills-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="shell">

<aside class="sidebar">
  <span class="status-dot">{{STATUS}}</span>
  <h1 class="name">{{NAME_DISPLAY}}</h1>
  <p class="title-label">{{TITLE}}</p>
  <div class="divider"></div>
  <p class="bio">{{BIO}}</p>
  <p class="section-label">Stack highlights</p>
  <div class="stack-grid">{{STACK_TAGS}}</div>
  <div class="divider"></div>
  <div class="contacts">{{CONTACTS}}</div>
  <nav class="nav-links" aria-label="Page sections">
    <a href="#experience" class="nav-link">Experience</a>
    <a href="#education" class="nav-link">Education</a>
    <a href="#skills" class="nav-link">Skills</a>
    <a href="#clearance" class="nav-link">Clearance</a>
  </nav>
</aside>

<main class="main">
  <section class="section" id="experience">
    <h2 class="section-head">Experience</h2>
    {{EXPERIENCE}}
  </section>

  <section class="section" id="education">
    <h2 class="section-head">Education</h2>
    {{EDUCATION}}
  </section>

  <section class="section" id="skills">
    <h2 class="section-head">Technical Skills</h2>
    <div class="skills-grid">{{SKILLS}}</div>
  </section>

  <section class="section" id="clearance">
    <h2 class="section-head">Clearance</h2>
    <span class="clearance-badge">{{CLEARANCE}}</span>
    <div style="margin-top:2rem">
      <a href="{{RESUME_PDF}}" download class="dl-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download Resume
      </a>
    </div>
    <div class="footer">{{FOOTER}}</div>
  </section>
</main>

</div>
</body>
</html>
